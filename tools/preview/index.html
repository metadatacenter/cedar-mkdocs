<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Tutorial Preview</title>
<base href="/docs/tutorials/">
<script src="/tools/preview/marked.min.js"></script>
<style>
  :root { color-scheme: light; }
  body {
    margin: 0; background: #f6f8fa;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }
  #page {
    max-width: 880px; margin: 24px auto; padding: 40px 48px 64px;
    background: #fff; border: 1px solid #d1d9e0; border-radius: 8px;
    line-height: 1.6; color: #1f2328;
  }
  #page h1 { border-bottom: 1px solid #d1d9e0; padding-bottom: .3em; }
  #page h2 { border-bottom: 1px solid #d1d9e0; padding-bottom: .3em; margin-top: 1.8em; }
  #page img { max-width: 100%; border: 1px solid #d1d9e0; border-radius: 6px; display: block; margin: 12px 0; }
  #page code { background: #f0f1f3; padding: .15em .35em; border-radius: 4px; font-size: 90%; }
  #page pre code { display: block; padding: 12px; overflow-x: auto; }
  #page blockquote { border-left: 4px solid #d1d9e0; margin-left: 0; padding-left: 16px; color: #59636e; }
  #page table { border-collapse: collapse; }
  #page th, #page td { border: 1px solid #d1d9e0; padding: 6px 12px; }
  #status {
    position: fixed; top: 10px; right: 14px; font-size: 12px; color: #59636e;
    background: #fff; border: 1px solid #d1d9e0; border-radius: 12px; padding: 3px 10px;
  }
  #status.err { color: #fff; background: #cf222e; border-color: #cf222e; }
</style>
</head>
<body>
<div id="status">loading…</div>
<div id="page"></div>
<script>
  const SRC = new URLSearchParams(location.search).get('src') || '/docs/tutorials/cedar_tutorial.md';
  let last = null;
  async function tick() {
    try {
      const r = await fetch(SRC, { cache: 'no-store' });
      if (!r.ok) throw new Error(r.status);
      const text = await r.text();
      if (text !== last) {
        last = text;
        const y = window.scrollY;
        document.getElementById('page').innerHTML = marked.parse(text);
        window.scrollTo(0, y);
        document.getElementById('status').textContent =
          'live · updated ' + new Date().toLocaleTimeString();
        document.getElementById('status').classList.remove('err');
      }
    } catch (e) {
      const s = document.getElementById('status');
      s.textContent = 'cannot load ' + SRC;
      s.classList.add('err');
    }
  }
  tick();
  setInterval(tick, 1000);
</script>
</body>
</html>
